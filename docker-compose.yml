services:
  parrot:
    hostname: parrot.htb
    build:
      context: ./
      dockerfile: Dockerfile
    image: 'roarene317/parrot_security:latest'
    restart: always
    cap_add:
      - NET_ADMIN
    ports:
      - ${BIND:-0.0.0.0:8080}:8080
    environment:
      - SHELL=/bin/bash
      - PASSWORD=${PASSWORD:-parrot}
    volumes:
      - data_parrot_htb:/home/kali/Desktop
    entrypoint: ["/bin/bash", "/startup.sh"]

volumes:
  data_parrot_htb: {}